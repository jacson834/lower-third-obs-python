<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle OBS Lower Thirds</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap');

        :root {
            --bg-0: #06131a;
            --bg-1: #0c1f29;
            --bg-2: #122b36;
            --panel: rgba(12, 31, 41, 0.82);
            --panel-border: rgba(138, 180, 198, 0.25);
            --text: #edf6fa;
            --muted: #b6cbd6;
            --accent: #16a3b8;
            --accent-2: #1f7a8c;
            --warm: #f59e0b;
            --danger: #ef4444;
            --success: #10b981;
            --input-bg: rgba(8, 23, 31, 0.65);
            --input-border: rgba(143, 182, 198, 0.3);
            --shadow: 0 10px 26px rgba(2, 8, 12, 0.35);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Manrope', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(1200px 520px at 5% 0%, rgba(22, 163, 184, 0.2) 0%, rgba(22, 163, 184, 0) 60%),
                radial-gradient(900px 500px at 100% 100%, rgba(245, 158, 11, 0.12) 0%, rgba(245, 158, 11, 0) 58%),
                linear-gradient(140deg, var(--bg-0) 0%, var(--bg-1) 45%, var(--bg-2) 100%);
            color: var(--text);
            padding: 12px;
            min-height: 100vh;
            font-size: 12px;
        }

        .container {
            max-width: 1800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 12px;
            font-size: 24px;
            letter-spacing: 0.4px;
            background: linear-gradient(120deg, #8ce5f2, #fcd34d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .global-controls {
            background: var(--panel);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid var(--panel-border);
            box-shadow: var(--shadow);
        }

        .storage-warning {
            position: fixed;
            top: 14px;
            right: 14px;
            z-index: 9999;
            max-width: 420px;
            padding: 10px 12px;
            border-radius: 6px;
            border: 1px solid rgba(245, 158, 11, 0.6);
            background: rgba(120, 68, 2, 0.34);
            color: #fde68a;
            font-size: 11px;
            line-height: 1.35;
            opacity: 0;
            transform: translateY(-10px);
            pointer-events: none;
            transition: opacity 0.22s ease, transform 0.22s ease;
        }

        .storage-warning.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .global-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        .global-controls h3 {
            font-size: 15px;
            margin: 0;
            color: #87d7e4;
        }

        .collapse-icon {
            font-size: 12px;
            transition: transform 0.3s ease;
        }

        .collapse-icon.open {
            transform: rotate(180deg);
        }

        .global-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            margin-top: 0;
        }

        .global-content.open {
            max-height: 500px;
            margin-top: 10px;
            transition: max-height 0.5s ease-in;
        }

        .global-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 8px;
            margin-bottom: 8px;
        }

        .global-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .global-group label {
            font-size: 10px;
            color: #d1d5db;
            font-weight: 500;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        .panels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 8px;
            margin-bottom: 10px;
        }

        .lower-third-panel {
            background: var(--panel);
            border-radius: 12px;
            padding: 11px;
            border: 1px solid var(--panel-border);
            box-shadow: var(--shadow);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding-bottom: 5px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .panel-title {
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .panel-number {
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 11px;
        }

        .toggle-switch {
            position: relative;
            width: 36px;
            height: 18px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #35515b;
            transition: 0.3s;
            border-radius: 20px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 12px;
            width: 12px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
        }

        input:checked+.slider:before {
            transform: translateX(18px);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        .form-group {
            margin-bottom: 8px;
        }

        label {
            display: block;
            margin-bottom: 3px;
            font-weight: 500;
            color: var(--muted);
            font-size: 10px;
        }

        input[type="text"],
        input[type="number"],
        input[type="color"],
        input[type="range"],
        select {
            width: 100%;
            padding: 5px 6px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 8px;
            color: var(--text);
            font-size: 11px;
            transition: all 0.3s;
        }

        input[type="color"] {
            height: 30px;
            cursor: pointer;
            padding: 2px;
        }

        input[type="range"] {
            padding: 0;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #4dd0e1;
            background: rgba(15, 44, 58, 0.95);
            box-shadow: 0 0 0 2px rgba(77, 208, 225, 0.16);
        }

        select option {
            background: #0f2530;
            color: var(--text);
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
            margin-top: 8px;
        }

        button {
            padding: 6px 8px;
            border: none;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-show {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }

        .btn-show:hover {
            opacity: 0.9;
        }

        .btn-hide {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }

        .btn-hide:hover {
            opacity: 0.9;
        }

        .btn-clear {
            background: linear-gradient(135deg, #6b7280, #4b5563);
            color: white;
        }

        .btn-clear:hover {
            opacity: 0.9;
        }

        .btn-add,
        .btn-auto {
            background: linear-gradient(135deg, #0ea5b7, #0b7285);
            color: white;
            padding: 8px 16px;
            font-size: 12px;
            margin: 8px auto;
            display: block;
        }

        .btn-auto {
            background: linear-gradient(135deg, #f59e0b, #b45309);
        }

        .btn-auto.active {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .global-apply-btn {
            background: linear-gradient(135deg, #0ea5b7, #0b7285);
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            margin-top: 8px;
            width: 100%;
        }

        .global-apply-btn:hover {
            opacity: 0.9;
        }

        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-left: 5px;
            animation: pulse 2s infinite;
        }

        .status-active {
            background: #10b981;
        }

        .status-inactive {
            background: #6b7280;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .settings-toggle {
            cursor: pointer;
            font-size: 10px;
            color: #89dbe7;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .settings-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }

        .settings-content.open {
            max-height: 500px;
            transition: max-height 0.5s ease-in;
        }

        .gear-icon {
            transition: transform 0.3s ease;
        }

        .gear-icon.open {
            transform: rotate(90deg);
        }

        .drag-handle {
            cursor: grab;
            user-select: none;
            font-size: 14px;
            color: #98b3bf;
            margin-right: 6px;
            transition: color 0.3s;
        }

        .drag-handle:hover {
            color: #8fe3ef;
        }

        .drag-handle:active {
            cursor: grabbing;
        }

        .panel-dragging {
            opacity: 0.5;
            transform: scale(0.98);
        }

        .move-controls {
            display: flex;
            gap: 4px;
        }

        .btn-move {
            background: linear-gradient(135deg, #6b7280, #4b5563);
            color: white;
            padding: 4px 8px;
            border: none;
            border-radius: 3px;
            font-size: 9px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-move:hover {
            opacity: 0.9;
        }

        .btn-move:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Scrollable settings fix */
        .settings-content {
            background: rgba(6, 23, 31, 0.55);
            border-radius: 0 0 10px 10px;
            margin-top: 5px;

            /* Hidden state defaults */
            max-height: 0;
            overflow: hidden;
            padding: 0 10px;
            opacity: 0;
            transition: all 0.3s ease-out;

            scrollbar-width: thin;
            scrollbar-color: #2f7f90 rgba(0, 0, 0, 0.15);
        }

        .settings-content.open {
            /* Open state */
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
            opacity: 1;
        }

        .settings-content::-webkit-scrollbar {
            width: 8px;
        }

        .settings-content::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
        }

        .settings-content::-webkit-scrollbar-thumb {
            background-color: #2f7f90;
            border-radius: 4px;
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #fca5a5;
            width: 24px;
            height: 24px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            margin-left: 8px;
            transition: all 0.2s;
        }

        .btn-delete:hover {
            background: rgba(239, 68, 68, 0.4);
            color: #fff;
            box-shadow: 0 0 8px rgba(239, 68, 68, 0.3);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Controle de Lower Thirds OBS</h1>
        <div id="storage-warning" class="storage-warning"></div>

        <div class="global-controls">
            <div class="global-header" onclick="toggleGlobalSettings()">
                <h3>Configuracoes Globais (Aplicar em Todos)</h3>
                <span class="collapse-icon">▼</span>
            </div>
            <div class="global-content">
                <div class="global-row">
                    <div class="global-group">
                        <label>Intervalo da Sequencia Automatica (s)</label>
                        <input type="number" id="auto-interval" value="2" min="0" max="30" step="0.5">
                    </div>
                </div>
                <div class="global-row">
                    <div class="global-group">
                        <label>Transicao</label>
                        <select id="global-transition">
                            <option value="slide">Deslizar</option>
                            <option value="bounce">Quicar</option>
                            <option value="fade">Esmaecer</option>
                            <option value="swing">Balancar</option>
                            <option value="flip">Virar</option>
                            <option value="elastic">Elastico</option>
                            <option value="zoom">Zoom</option>
                            <option value="rotate">Girar</option>
                            <option value="wave">Onda</option>
                            <option value="glitch">Glitch</option>
                            <option value="curtain">Cortina</option>
                            <option value="scroll">Rolagem</option>
                        </select>
                    </div>
                    <div class="global-group">
                        <label>Duracao na Tela (s)</label>
                        <input type="number" id="global-duration" value="5" min="1" max="60" step="0.5">
                    </div>
                    <div class="global-group">
                        <label>Animacao de Entrada (s)</label>
                        <input type="number" id="global-anim-in" value="0.8" min="0.1" max="5" step="0.1">
                    </div>
                    <div class="global-group">
                        <label>Animacao de Saida (s)</label>
                        <input type="number" id="global-anim-out" value="0.6" min="0.1" max="5" step="0.1">
                    </div>
                </div>
                <div class="global-row">
                    <div class="global-group">
                        <label>Fonte</label>
                        <select id="global-font-family">
                            <option value="Montserrat">Montserrat</option>
                            <option value="Poppins">Poppins</option>
                            <option value="Roboto">Roboto</option>
                            <option value="Open Sans">Open Sans</option>
                            <option value="Lato">Lato</option>
                            <option value="Oswald">Oswald</option>
                            <option value="Raleway">Raleway</option>
                            <option value="Arial">Arial</option>
                            <option value="Helvetica">Helvetica</option>
                            <option value="Georgia">Georgia</option>
                            <option value="Times New Roman">Times New Roman</option>
                        </select>
                    </div>
                    <div class="global-group">
                        <label>Tamanho da Fonte do Nome (px)</label>
                        <input type="number" id="global-name-size" value="32" min="12" max="100" step="1">
                    </div>
                    <div class="global-group">
                        <label>Tamanho da Fonte do Titulo (px)</label>
                        <input type="number" id="global-title-size" value="20" min="10" max="80" step="1">
                    </div>
                </div>
                <div class="global-row">
                    <div class="global-group">
                        <label>Estilo de Fundo</label>
                        <select id="global-bg-style">
                            <option value="gradient1">Gradiente Azul-Roxo</option>
                            <option value="gradient2">Gradiente Vermelho-Laranja</option>
                            <option value="gradient3">Gradiente Verde-Turquesa</option>
                            <option value="gradient4">Gradiente Rosa-Roxo</option>
                            <option value="solid1">Azul Solido</option>
                            <option value="solid2">Escuro Solido</option>
                            <option value="transparent">Transparente</option>
                            <option value="custom">Cor Personalizada</option>
                        </select>
                    </div>
                    <div class="global-group">
                        <label>Transparencia (%)</label>
                        <input type="number" id="global-transparency" value="95" min="0" max="100">
                    </div>
                    <div class="global-group" style="display: flex; align-items: flex-end;">
                        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; margin: 0;">
                            <input type="checkbox" id="global-typewriter" checked>
                            Efeito de Maquina de Escrever
                        </label>
                    </div>
                </div>
                <button class="global-apply-btn" onclick="applyGlobalSettings()">Aplicar em Todos os Lower Thirds</button>
            </div>
        </div>

        <div class="panels-grid" id="panels-container">
            <!-- Panels will be generated here -->
        </div>

        <button class="btn-add" onclick="addPanel()">+ Adicionar Painel de Lower Third</button>
        <button class="btn-auto" id="auto-sequence-btn" onclick="toggleAutoSequence()">▶ Iniciar Sequencia Automatica</button>
    </div>

    <script>
        const CONTROL_CHANNEL_NAME = 'obs-lower-thirds-control';
        const CONTROL_MESSAGE_KEY = 'obs-lower-thirds-control-message';
        let channel = null;
        try {
            channel = new BroadcastChannel(CONTROL_CHANNEL_NAME);
        } catch (e) {
            console.warn('BroadcastChannel indisponivel, usando fallback via localStorage');
        }
        const SETTINGS_STORAGE_KEY = 'obs-lower-thirds-settings';
        const MAX_LOGO_DATA_URL_LENGTH = 250000;
        let panelCount = 4;
        const activeStates = {};
        const timers = {};
        let currentlyActive = null;
        let autoSequenceRunning = false;
        let autoSequenceTimeout = null;
        let autoSequenceIndex = 0;
        let activePanelIds = [];

        function sendControlMessage(message) {
            if (channel) {
                try {
                    channel.postMessage(message);
                } catch (e) {
                    console.warn('Falha ao enviar via BroadcastChannel:', e);
                }
            }

            try {
                const envelope = {
                    ...message,
                    _transportTs: Date.now(),
                    _transportNonce: Math.random().toString(36).slice(2)
                };
                localStorage.setItem(CONTROL_MESSAGE_KEY, JSON.stringify(envelope));
            } catch (e) {
                console.error('Falha ao enviar fallback via localStorage:', e);
            }
        }

        function init() {
            loadSettings();
            // If no panels loaded, create defaults
            if (activePanelIds.length === 0) {
                for (let i = 1; i <= 4; i++) {
                    createPanel(i);
                    activePanelIds.push(i);
                }
                panelCount = 4;
                saveSettings(); // Save the default state
            }
            attachSaveListeners();
        }

        function createPanel(id) {
            const container = document.getElementById('panels-container');
            const panel = document.createElement('div');
            panel.className = 'lower-third-panel';
            panel.id = `panel-${id}`;
            panel.innerHTML = `
                <div class="panel-header">
                    <div class="panel-title">
                        <span class="drag-handle" draggable="true" data-panel-id="${id}">⋮⋮</span>
                        <div class="panel-number">${id}</div>
                        <span>Lower Third ${id}</span>
                        <span class="status-indicator status-inactive" id="status-${id}"></span>
                    </div>
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <div class="move-controls">
                            <button class="btn-move" onclick="movePanel(${id}, 'up')" title="Mover para Cima">↑</button>
                            <button class="btn-move" onclick="movePanel(${id}, 'down')" title="Mover para Baixo">↓</button>
                        </div>
                        <button class="btn-delete" onclick="deletePanel(${id})" title="Excluir Painel">🗑️</button>
                        <label class="toggle-switch">
                            <input type="checkbox" id="toggle-${id}" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <label>Nome</label>
                    <input type="text" id="name-${id}" placeholder="Digite o nome...">
                </div>
                <div class="form-group">
                    <label>Titulo</label>
                    <input type="text" id="info-${id}" placeholder="Digite o titulo...">
                </div>
                <div class="button-group">
                    <button class="btn-show" onclick="showLowerThird(${id})">Mostrar</button>
                    <button class="btn-hide" onclick="hideLowerThird(${id})">Ocultar</button>
                    <button class="btn-clear" onclick="clearFields(${id})">Limpar</button>
                </div>
                <div class="settings-toggle" onclick="toggleSettings(${id})">
                    <span class="gear-icon" id="gear-${id}">⚙️</span>
                    <span>Configuracoes Avancadas</span>
                </div>
                <div class="settings-content" id="settings-${id}">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Transicao</label>
                            <select id="transition-${id}">
                                <option value="slide">Deslizar</option>
                                <option value="bounce">Quicar</option>
                                <option value="fade">Esmaecer</option>
                                <option value="swing">Balancar</option>
                                <option value="flip">Virar</option>
                                <option value="elastic">Elastico</option>
                                <option value="zoom">Zoom</option>
                                <option value="rotate">Girar</option>
                                <option value="wave">Onda</option>
                                <option value="glitch">Glitch</option>
                                <option value="curtain">Cortina</option>
                                <option value="scroll">Rolagem</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Duracao (s)</label>
                            <input type="number" id="duration-${id}" value="5" min="1" max="60" step="0.5">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Entrada (s)</label>
                            <input type="number" id="anim-in-${id}" value="0.8" min="0.1" max="5" step="0.1">
                        </div>
                        <div class="form-group">
                            <label>Saida (s)</label>
                            <input type="number" id="anim-out-${id}" value="0.6" min="0.1" max="5" step="0.1">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Fonte</label>
                        <select id="font-family-${id}">
                            <option value="Montserrat">Montserrat</option>
                            <option value="Poppins">Poppins</option>
                            <option value="Roboto">Roboto</option>
                            <option value="Open Sans">Open Sans</option>
                            <option value="Lato">Lato</option>
                            <option value="Oswald">Oswald</option>
                            <option value="Raleway">Raleway</option>
                            <option value="Arial">Arial</option>
                            <option value="Helvetica">Helvetica</option>
                            <option value="Georgia">Georgia</option>
                            <option value="Times New Roman">Times New Roman</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Tamanho do Nome (px)</label>
                            <input type="number" id="name-size-${id}" value="32" min="12" max="100" step="1">
                        </div>
                        <div class="form-group">
                            <label>Tamanho do Titulo (px)</label>

        function getBackground(id) {
            const style = document.getElementById(`bg-style-${id}`).value;
            const transparency = document.getElementById(`transparency-${id}`).value / 100;

            if (style === 'custom') {
                const c1 = document.getElementById(`custom-color1-${id}`).value;
                const c2 = document.getElementById(`custom-color2-${id}`).value;
                // Convert hex to rgba for transparency
                const hexToRgba = (hex, alpha) => {
                    const r = parseInt(hex.slice(1, 3), 16);
                    const g = parseInt(hex.slice(3, 5), 16);
                    const b = parseInt(hex.slice(5, 7), 16);
                    return `rgba(${r}, ${g}, ${b}, ${alpha})`;
                };
                return `linear-gradient(135deg, ${hexToRgba(c1, transparency)}, ${hexToRgba(c2, transparency)})`;
            }

            const gradientMap = {
                gradient1: [[59, 130, 246], [147, 51, 234]],
                gradient2: [[239, 68, 68], [249, 115, 22]],
                gradient3: [[16, 185, 129], [20, 184, 166]],
                gradient4: [[236, 72, 153], [168, 85, 247]]
            };

            if (gradientMap[style]) {
                const colors = gradientMap[style];
                return `linear-gradient(135deg, rgba(${colors[0][0]}, ${colors[0][1]}, ${colors[0][2]}, ${transparency}), rgba(${colors[1][0]}, ${colors[1][1]}, ${colors[1][2]}, ${transparency}))`;
            }

            if (style === 'solid1') return `rgba(59, 130, 246, ${transparency})`;
            if (style === 'solid2') return `rgba(30, 30, 30, ${transparency})`;
            if (style === 'transparent') return 'transparent';

            return `rgba(59, 130, 246, ${transparency})`;
        }

        function showLowerThird(id) {
            const name = document.getElementById(`name-${id}`).value;

            const duration = parseFloat(document.getElementById(`duration-${id}`).value);

            const nameSize = document.getElementById(`name-size-${id}`).value;

            const titleColor = document.getElementById(`title-color-${id}`).value;

            const logoUrl = document.getElementById(`logo-url-${id}`).value;
            const logoSize = document.getElementById(`logo-size-${id}`).value;
            const logoPosition = document.getElementById(`logo-position-${id}`).value;

            if (!toggle) {
                alert(`Ative o LT${id} primeiro.`);
                return;
            }

            if (!name || !info) {
                alert('Preencha Nome e Titulo.');
                return;
            }

            if (currentlyActive !== null && currentlyActive !== id) {
                hideLowerThird(currentlyActive);
            }

            sendControlMessage({
                action: 'show',
                id: id,
                name: name,
                info: info,
                transition: transition,
                animIn: animIn,
                animOut: animOut,
                background: background,
                typewriter: typewriter,
                fontFamily: fontFamily,
                nameSize: nameSize,
                titleSize: titleSize,
                nameColor: nameColor,
                titleColor: titleColor,
                logoEnabled: logoEnabled,
                logoUrl: logoUrl,
                logoSize: logoSize,
                logoPosition: logoPosition
            });

            activeStates[id] = true;
            currentlyActive = id;
            updateStatus(id);

            let timeLeft = duration;
            const timerEl = document.getElementById(`timer-${id}`);
            timerEl.textContent = `⏱️ ${timeLeft.toFixed(1)}s`;

            if (timers[id]) clearInterval(timers[id]);

            timers[id] = setInterval(() => {
                timeLeft -= 0.1;
                if (timeLeft > 0) {
                    timerEl.textContent = `⏱️ ${timeLeft.toFixed(1)}s`;
                } else {
                    clearInterval(timers[id]);
                    hideLowerThird(id);
                    timerEl.textContent = '';

            }, 100);

        function hideLowerThird(id) {
            const animOutEl = document.getElementById(`anim-out-${id}`);
            if (!animOutEl) {
                activeStates[id] = false;
                if (currentlyActive === id) currentlyActive = null;
                return;
            }
            const animOut = parseFloat(animOutEl.value);

            sendControlMessage({
                action: 'hide',
                id: id,
                animOut: animOut
            });

            activeStates[id] = false;
            if (currentlyActive === id) {
                currentlyActive = null;
            }
            updateStatus(id);

            if (timers[id]) {
                clearInterval(timers[id]);
                document.getElementById(`timer-${id}`).textContent = '';
            }
        }

        function startAutoSequence() {
            const enabledPanels = [];
            for (let i = 1; i <= panelCount; i++) {
                const toggle = document.getElementById(`toggle-${i}`);
                const name = document.getElementById(`name-${i}`)?.value;
                const info = document.getElementById(`info-${i}`)?.value;
                if (toggle && toggle.checked && name && info) {
                    enabledPanels.push(i);
                }
            }

            if (enabledPanels.length === 0) {
                alert('Ative e preencha pelo menos um lower third!');
                toggleAutoSequence();
                return;
            }

            autoSequenceIndex = 0;
            runAutoSequence(enabledPanels);
        }

        function runAutoSequence(enabledPanels) {
            if (!autoSequenceRunning) return;

            const id = enabledPanels[autoSequenceIndex];
            const duration = parseFloat(document.getElementById(`duration-${id}`).value);
            const interval = parseFloat(document.getElementById('auto-interval').value);

            showLowerThird(id);

            autoSequenceTimeout = setTimeout(() => {
                if (!autoSequenceRunning) return;

                autoSequenceIndex = (autoSequenceIndex + 1) % enabledPanels.length;

                autoSequenceTimeout = setTimeout(() => {
                    runAutoSequence(enabledPanels);
                }, interval * 1000);
            }, duration * 1000);
        }

        function stopAutoSequence() {
            if (autoSequenceTimeout) {
                clearTimeout(autoSequenceTimeout);
                autoSequenceTimeout = null;
            }
        }

        function movePanel(id, direction) {
            const container = document.getElementById('panels-container');
            const panels = Array.from(container.children);
            const panel = document.getElementById(`panel-${id}`);
            const index = panels.indexOf(panel);

            if (direction === 'up' && index > 0) {
                container.insertBefore(panel, panels[index - 1]);
                saveSettings();
            } else if (direction === 'down' && index < panels.length - 1) {
                container.insertBefore(panels[index + 1], panel);
                saveSettings();
            }
        }

        function setStorageWarning(message, durationMs) {

            clearTimeout(storageWarningTimeout);

            if (!message) {
                warningEl.textContent = '';
                warningEl.classList.remove('visible');
                return;
            }

            warningEl.textContent = message;
            warningEl.classList.add('visible');

            const timeout = typeof durationMs === 'number' ? durationMs : 4000;
            storageWarningTimeout = setTimeout(() => {
                warningEl.classList.remove('visible');
            }, timeout);
        }

        function safelySaveSettings(settings) {
            const trimmedSettings = JSON.parse(JSON.stringify(settings));
            let removedLargeLogos = 0;

            Object.values(trimmedSettings.panels).forEach(panel => {
                if (panel.logoUrl && panel.logoUrl.startsWith('data:') && panel.logoUrl.length > MAX_LOGO_DATA_URL_LENGTH) {
                    panel.logoUrl = '';
                    removedLargeLogos++;
                }
            });

            if (removedLargeLogos > 0) {
                setStorageWarning(`Aviso: ${removedLargeLogos} logo(s) eram grandes demais para salvar no armazenamento do navegador. Use uma imagem menor ou URL/caminho.`, 4000);
            } else {
                setStorageWarning('');
            }

            try {
                localStorage.setItem(SETTINGS_STORAGE_KEY, JSON.stringify(trimmedSettings));
                console.log('Configuracoes salvas no localStorage');
            } catch (e) {
                console.error('Could not save settings to localStorage:', e);
                setStorageWarning('Aviso: nao foi possivel salvar as configuracoes no armazenamento do navegador (quota excedida). Reduza o tamanho do logo/imagem.', 6000);
            }
        }

        function loadSettings() {
            const saved = localStorage.getItem(SETTINGS_STORAGE_KEY);
            if (!saved) {
                console.log('Nenhuma configuracao salva encontrada');
                return;
            }

            try {
                const settings = JSON.parse(saved);
                console.log('Carregando configuracoes do localStorage', settings);

                // Restore panel max count generator
                if (settings.panelCount) {
                    panelCount = settings.panelCount;
                }

                // Restore active panels
                if (settings.activeIds && Array.isArray(settings.activeIds)) {
                    // Start fresh tracking
                    activePanelIds = [];

                    // Create needed panels
                    settings.activeIds.forEach(id => {
                        if (!document.getElementById(`panel-${id}`)) {
                            createPanel(id);
                        }
                        activePanelIds.push(id);

                        // Load data
                        if (settings.panels && settings.panels[id]) {
                            loadPanelSettings(id, settings.panels[id]);
                        }
                    });

                    // Cleanup any panels in DOM that aren't in activeIds (though createPanel is additive, let's be safe)
                    // ... implementation detail: if we started blank, we are fine. 

                } else {
                    // Legacy Fallback
                    if (settings.panelCount && settings.panelCount >= 1) {
                        const max = settings.panelCount >= 4 ? settings.panelCount : 4;
                        activePanelIds = [];
                        for (let i = 1; i <= max; i++) {
                            if (!document.getElementById(`panel-${i}`)) createPanel(i);
                            activePanelIds.push(i);
                            if (settings.panels && settings.panels[i]) {
                                loadPanelSettings(i, settings.panels[i]);
                            }
                        }
                    }
                }

                // Restore global settings
                if (settings.global) {
                    const globalInterval = document.getElementById('auto-interval');
                    const globalTransition = document.getElementById('global-transition');
                    const globalDuration = document.getElementById('global-duration');
                    const globalAnimIn = document.getElementById('global-anim-in');
                    const globalAnimOut = document.getElementById('global-anim-out');
                    const globalBgStyle = document.getElementById('global-bg-style');
                    const globalTransparency = document.getElementById('global-transparency');
                    const globalTypewriter = document.getElementById('global-typewriter');
                    const globalFontFamily = document.getElementById('global-font-family');
                    const globalNameSize = document.getElementById('global-name-size');
                    const globalTitleSize = document.getElementById('global-title-size');

                    if (globalInterval && settings.global.autoInterval !== undefined)
                        globalInterval.value = settings.global.autoInterval;
                    if (globalTransition && settings.global.transition)
                        globalTransition.value = settings.global.transition;
                    if (globalDuration && settings.global.duration !== undefined)
                        globalDuration.value = settings.global.duration;
                    if (globalAnimIn && settings.global.animIn !== undefined)
                        globalAnimIn.value = settings.global.animIn;
                    if (globalAnimOut && settings.global.animOut !== undefined)
                        globalAnimOut.value = settings.global.animOut;
                    if (globalBgStyle && settings.global.bgStyle)
                        globalBgStyle.value = settings.global.bgStyle;
                    if (globalTransparency && settings.global.transparency !== undefined)
                        globalTransparency.value = settings.global.transparency;
                    if (globalTypewriter && settings.global.typewriter !== undefined)
                        globalTypewriter.checked = settings.global.typewriter;
                    if (globalFontFamily && settings.global.fontFamily)
                        globalFontFamily.value = settings.global.fontFamily;
                    if (globalNameSize && settings.global.nameSize !== undefined)
                        globalNameSize.value = settings.global.nameSize;
                    if (globalTitleSize && settings.global.titleSize !== undefined)
                        globalTitleSize.value = settings.global.titleSize;
                }

                console.log('Configuracoes carregadas com sucesso');
            } catch (e) {
                console.error('Error loading settings:', e);
            }
        }

        function loadPanelSettings(id, panel) {
            const nameEl = document.getElementById(`name-${id}`);
            const infoEl = document.getElementById(`info-${id}`);
            const transitionEl = document.getElementById(`transition-${id}`);
            const durationEl = document.getElementById(`duration-${id}`);
            const animInEl = document.getElementById(`anim-in-${id}`);
            const animOutEl = document.getElementById(`anim-out-${id}`);
            const bgStyleEl = document.getElementById(`bg-style-${id}`);
            const transparencyEl = document.getElementById(`transparency-${id}`);
            const typewriterEl = document.getElementById(`typewriter-${id}`);
            const customColor1El = document.getElementById(`custom-color1-${id}`);
            const customColor2El = document.getElementById(`custom-color2-${id}`);
            const toggleEl = document.getElementById(`toggle-${id}`);
            const fontFamilyEl = document.getElementById(`font-family-${id}`);
            const nameSizeEl = document.getElementById(`name-size-${id}`);
            const titleSizeEl = document.getElementById(`title-size-${id}`);
            const nameColorEl = document.getElementById(`name-color-${id}`);
            const titleColorEl = document.getElementById(`title-color-${id}`);
            const logoEnabledEl = document.getElementById(`logo-enabled-${id}`);
            const logoUrlEl = document.getElementById(`logo-url-${id}`);
            const logoSizeEl = document.getElementById(`logo-size-${id}`);
            const logoPositionEl = document.getElementById(`logo-position-${id}`);

            if (nameEl && panel.name !== undefined) nameEl.value = panel.name;
            if (infoEl && panel.info !== undefined) infoEl.value = panel.info;
            if (transitionEl && panel.transition) transitionEl.value = panel.transition;
            if (durationEl && panel.duration !== undefined) durationEl.value = panel.duration;
            if (animInEl && panel.animIn !== undefined) animInEl.value = panel.animIn;
            if (animOutEl && panel.animOut !== undefined) animOutEl.value = panel.animOut;
            if (bgStyleEl && panel.bgStyle) {
                bgStyleEl.value = panel.bgStyle;
                toggleCustomColor(id);
            }
            if (transparencyEl && panel.transparency !== undefined) {
                transparencyEl.value = panel.transparency;
                updateTransparencyValue(id);
            }
            if (typewriterEl && panel.typewriter !== undefined) typewriterEl.checked = panel.typewriter;
            if (customColor1El && panel.customColor1) customColor1El.value = panel.customColor1;
            if (customColor2El && panel.customColor2) customColor2El.value = panel.customColor2;
            if (toggleEl && panel.enabled !== undefined) toggleEl.checked = panel.enabled;
            if (fontFamilyEl && panel.fontFamily) fontFamilyEl.value = panel.fontFamily;
            if (nameSizeEl && panel.nameSize !== undefined) nameSizeEl.value = panel.nameSize;
            if (titleSizeEl && panel.titleSize !== undefined) titleSizeEl.value = panel.titleSize;
            if (nameColorEl && panel.nameColor) nameColorEl.value = panel.nameColor;
            if (titleColorEl && panel.titleColor) titleColorEl.value = panel.titleColor;
            if (logoEnabledEl && panel.logoEnabled !== undefined) {
                logoEnabledEl.checked = panel.logoEnabled;
                toggleLogoSettings(id);
            }
            if (logoUrlEl && panel.logoUrl) logoUrlEl.value = panel.logoUrl;
            if (logoSizeEl && panel.logoSize !== undefined) logoSizeEl.value = panel.logoSize;
            if (logoPositionEl && panel.logoPosition) logoPositionEl.value = panel.logoPosition;
        }

        function attachSaveListeners() {
            // Attach listeners to all inputs to auto-save on change
            document.querySelectorAll('input, select').forEach(element => {
                if (element.dataset.saveBound === '1') {
                    return;
                }
                element.addEventListener('change', saveSettings);
                if (element.type === 'text' || element.type === 'number') {
                    element.addEventListener('input', saveSettings);
                }
                element.dataset.saveBound = '1';
            });
        }

        init();
    </script>
